<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Erlen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f4f4f4;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --accent: #111;
    }

    body.dark {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #f1f1f1;
      --muted: #aaa;
      --accent: #ffffff;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    header {
      padding: 2rem;
      text-align: center;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 1rem;
    }

    .pub {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 160px;
      height: 500px;
      background: #ddd;
      border: 3px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    .pub-gauche { left: 20px; }
    .pub-droite { right: 20px; }

    @media (max-width: 1200px) {
      .pub { display: none; }
    }

    .card {
      background: var(--card);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: background 0.3s ease;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    h3 {
      margin-top: 2rem;
    }

    audio {
      width: 100%;
      margin-top: 8px;
      border-radius: 8px;
      outline: none;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }

    .dark-toggle {
      margin-top: 1rem;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--muted);
      background: transparent;
      color: var(--text);
    }

    /* POPUP */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup-content {
      background: #111;
      color: white;
      padding: 30px;
      border-radius: 15px;
      width: 80%;
      max-width: 500px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
    }

    .scrolling-text {
      white-space: nowrap;
      overflow: hidden;
    }

    .scrolling-text p {
      display: inline-block;
      padding-left: 100%;
      animation: scrollText 10s linear infinite;
      margin: 0;
    }

    @keyframes scrollText {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }
    #blocProgramme{
      background:white;
      border-radius:10px;
      padding:15px 20px;
      width:400px;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
      font-size:18px;
    }

    #programme{
      color:#333;
    }
  </style>
</head>

<body>

  <div id="welcomePopup" class="popup-overlay">
    <div class="popup-content">
      <button class="close-btn" onclick="closePopup()">✖</button>
      <div class="scrolling-text">
        <p>⭕️ Bienvenue sur Erlen ⌾ Radios gratuites ⌾ Site en développement ⭕️</p>
      </div>
    </div>
  </div>

  <header>
    <h1>Erlen</h1>
  </header>

  <main>
    <div class="pub pub-gauche">
      <img src="ad3.png" alt="Publicité" onclick="window.location.href='https://devffin.github.io/rdir?type=pub&pubnb=3'" style="max-width:100%;">
    </div>

    <div class="pub pub-droite">
      <img src="ad2.png" alt="Publicité" onclick="window.location.href='https://devffin.github.io/rdir?type=pub&pubnb=2'" style="max-width:100%;">
    </div>

    <section class="card">
      <h2>Bienvenue sur Erlen !</h2>
      <p>Le site d'hébergement de radios.</p>

      <a href="maintenance.html" class="btn">En savoir plus</a>

      <h3><a href="oslo.html">Oslo en direct</a></h3>
      <audio controls>
        <source src="https://uk22freenew.listen2myradio.com/live.mp3?typeportmount=s1_4292_stream_853705832" type="audio/mpeg">
      </audio>
      <div id="blocProgramme">
        <b>En ce moment :</b>
        <span id="programme1">Chargement...</span>
      </div>

      <h3><a href="iradio.html">IRadio en direct</a></h3>
      <audio controls>
        <source src="https://uk22freenew.listen2myradio.com/live.mp3?typeportmount=ice_19482_stream_255980060" type="audio/mpeg">
      </audio>
      <div id="blocProgramme">
        <b>En ce moment :</b>
        <span id="programme2">Chargement...</span>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Erlen <br>
    <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Mode sombre</button>
  </footer>

  <script>
    function closePopup() {
      document.getElementById("welcomePopup").style.display = "none";
    }

    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }

    function chargerProgramme(){

      fetch("programme1.txt")
      .then(r => r.text())
      .then(text => {
        document.getElementById("programme1").textContent = text;
      });

      fetch("programme2.txt")
      .then(r => r.text())
      .then(text => {
        document.getElementById("programme2").textContent = text;
      });

    }

    chargerProgramme();

    setInterval(chargerProgramme,10000);
  </script>

</body>
</html>
