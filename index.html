<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <title>Erlen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      :root {
        --bg: #fff
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 2rem;
        text-align: center;
      }
      .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .popup-content {
        background: #111;
        color: white;
        padding: 30px;
        border-radius: 15px;
        width: 80%;
        max-width: 500px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 24px;
        cursor: pointer;
      }
      .scrolling-text {
        white-space: nowrap;
        overflow: hidden;
        box-sizing: border-box;
      }
      .scrolling-text p {
        display: inline-block;
        padding-left: 100%;
        animation: scrollText 10s linear infinite;
      }
      @keyframes scrollText {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-100%);
        }
      }
    </style>

  </head>
  <!-- POPUP D'ACCUEIL -->
<div id="welcomePopup" class="popup-overlay">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">×</span>
    <div class="scrolling-text">
      <p>
        ✨ METS TON TEXTE ICI ✨ METS TON TEXTE ICI ✨ METS TON TEXTE ICI ✨
      </p>
    </div>
  </div>
</div>
  <script>
function closePopup() {
  document.getElementById("welcomePopup").style.display = "none";
}
</script>
  <body>
    <header>
      <h1>Erlen</h1>
    </header>
    <h1>Bienvenue sur Erlen !</h1>
    <p>Ce site est actuellement en développement. Merci d'attendre que le site soit fini.</p>
  </body>
</html>
