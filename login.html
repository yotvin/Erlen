<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion | Erlen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto; }
    input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <h1>Se connecter</h1>

  <button id="googleLogin">Se connecter avec Google</button>
  <hr>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button id="loginBtn">Se connecter</button>
  <button id="signupBtn">S’inscrire</button>

  <!-- 🔹 Scripts Firebase v10 compat -->
  <script src="https://www.gstatic.com/firebasejs/10.16.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.16.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.16.0/firebase-firestore-compat.js"></script>

  <!-- 🔹 Script principal -->
  <script>
    // Configuration Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAjCWXm9IrNgRb40CEThEQn3uDfV14h3d8",
      authDomain: "erlen-ytv.firebaseapp.com",
      projectId: "erlen-ytv",
      storageBucket: "erlen-ytv.appspot.com",
      messagingSenderId: "188574671375",
      appId: "1:188574671375:web:6c518dd4ce23f082c1b97a"
    };

    // Initialisation Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- Email/Mot de passe ---
    document.getElementById("signupBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          alert("Compte créé !");
          db.collection("users").doc(user.uid).set({
            email: user.email,
            role: "user",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
        })
        .catch(error => alert(error.message));
    });

    document.getElementById("loginBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(userCredential => {
          const user = userCredential.user;
          db.collection("users").doc(user.uid).get()
            .then(doc => {
              if (doc.exists && doc.data().role === "admin") {
                window.location.href = "admin.html";
              } else {
                window.location.href = "dashboard.html";
              }
            });
        })
        .catch(error => alert(error.message));
    });

    // --- Google login ---
    const provider = new firebase.auth.GoogleAuthProvider();
    document.getElementById("googleLogin").addEventListener("click", () => {
      auth.signInWithPopup(provider)
        .then(result => {
          const user = result.user;
          db.collection("users").doc(user.uid).get().then(doc => {
            if (!doc.exists) {
              return db.collection("users").doc(user.uid).set({
                name: user.displayName,
                email: user.email,
                role: "user",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
            }
          }).then(() => {
            db.collection("users").doc(user.uid).get().then(doc => {
              if (doc.exists && doc.data().role === "admin") {
                window.location.href = "admin.html";
              } else {
                window.location.href = "dashboard.html";
              }
            });
          });
        })
        .catch(error => alert("Erreur Google : " + error.message));
    });
  </script>
</body>
</html>
